<!DOCTYPE html>
<html>
<head>
    <title>Tic Tac Toe</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #34495e; color: white; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; justify-content: center; margin-top: 20px; }
        .cell { width: 100px; height: 100px; background: #ecf0f1; color: #2c3e50; font-size: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>OX Game (Tic Tac Toe)</h1>
    <div class="board" id="board"></div>
    <h2 id="status">खेळ सुरू करा!</h2>
    <button onclick="resetGame()" style="padding: 10px; margin-top: 20px;">रीसेट करा</button>

    <script>
        let board = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        const boardEl = document.getElementById("board");
        const statusEl = document.getElementById("status");

        function createBoard() {
            boardEl.innerHTML = "";
            board.forEach((val, i) => {
                let cell = document.createElement("div");
                cell.className = "cell";
                cell.innerText = val;
                cell.onclick = () => play(i);
                boardEl.appendChild(cell);
            });
        }

        function play(i) {
            if (board[i] === "" && !checkWinner()) {
                board[i] = currentPlayer;
                currentPlayer = currentPlayer === "X" ? "O" : "X";
                statusEl.innerText = checkWinner() ? `विजेता: ${checkWinner()}` : `पुढचा चाली: ${currentPlayer}`;
                createBoard();
            }
        }

        function checkWinner() {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            for(let [a,b,c] of lines) {
                if(board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
            }
            return board.includes("") ? null : "ड्रॉ!";
        }

        function resetGame() { board = ["", "", "", "", "", "", "", "", ""]; currentPlayer = "X"; statusEl.innerText = "खेळ सुरू करा!"; createBoard(); }
        createBoard();
    </script>
</body>
</html>
